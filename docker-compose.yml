services:
  api-public:
    build:
      context: .
      dockerfile: apps/api-public/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${API_PUBLIC_PORT:-3001}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      FRONTEND_URL: ${FRONTEND_URL}
    expose:
      - "${API_PUBLIC_PORT:-3001}"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const port = process.env.PORT ?? '3001'; const response = await fetch('http://127.0.0.1:' + port + '/api/health'); if (!response.ok) process.exit(1);",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  web-public:
    build:
      context: .
      dockerfile: apps/web-public/Dockerfile
    restart: unless-stopped
    depends_on:
      api-public:
        condition: service_healthy
    # ports:
    #   - "${WEB_PUBLIC_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s